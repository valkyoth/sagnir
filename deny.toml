# Sagnir dependency policy.
#
# Sagnir is an EUPL-1.2 project. Third-party dependencies are checked with a
# narrow allow-list so incompatible or unclear licenses fail early.

[graph]
all-features = true

[licenses]
confidence-threshold = 0.95
include-dev = true
include-build = true
unused-allowed-license = "allow"
unused-license-exception = "deny"

allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "EUPL-1.2",
    "ISC",
    "MIT",
    "MIT-0",
    # Required by libfuzzer-sys v0.4.13 for the standalone fuzz workspace;
    # reviewed 2026-06-17.
    "NCSA",
    "Unicode-3.0",
    "Zlib",
]

exceptions = [
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"

[advisories]
db-path = ".cargo-deny-advisory-dbs"
yanked = "deny"
unmaintained = "all"
unsound = "all"
unused-ignored-advisory = "deny"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
