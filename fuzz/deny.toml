# Sagnir fuzz dependency policy.
#
# The fuzz package is a standalone workspace so nightly cargo-fuzz plumbing
# stays outside the stable root workspace. Run this policy explicitly with:
# cargo deny --manifest-path fuzz/Cargo.toml --config fuzz/deny.toml check

[graph]
all-features = true

[licenses]
confidence-threshold = 0.95
include-dev = true
include-build = true
unused-allowed-license = "allow"
unused-license-exception = "deny"

allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "EUPL-1.2",
    "MIT",
    # Required by libfuzzer-sys v0.4.13; reviewed 2026-06-17.
    "NCSA",
    "Unicode-3.0",
]

exceptions = [
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"

[advisories]
db-path = "../.cargo-deny-advisory-dbs"
yanked = "deny"
unmaintained = "all"
unsound = "all"
unused-ignored-advisory = "deny"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
