name: Bug Report
description: Report a bug, missing behavior, or unexpected Sagnir issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### Security notice
        If this is an exploitable security vulnerability, do not open a public issue. Follow the disclosure guidelines in SECURITY.md.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug, missing behavior, or confusing documentation.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: What did you expect to happen?
      description: Describe the behavior or output you expected.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: How can we reproduce it?
      description: Provide clear steps, commands, or files that trigger the issue.
      placeholder: |
        1. Run saga init...
        2. Run saga status...
        3. See unexpected output...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Version and Build Environment
      description: Provide technical details about the exact environment.
      placeholder: |
        - Sagnir version or commit hash:
        - Rust toolchain version:
        - Host operating system:
        - Deployment mechanism:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Console Output
      description: Paste relevant output. Strip private keys, auth tokens, paths with secrets, and sensitive repository data before posting.
      render: text
