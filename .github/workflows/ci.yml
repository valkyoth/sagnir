name: Rust CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Format, lint, test, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        run: rustup show

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ripgrep

      - name: Install security tools
        run: scripts/install_security_tools.sh

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Validate release metadata
        run: scripts/validate-release-metadata.sh

      - name: Validate modularity policy
        run: scripts/validate-modularity-policy.sh check

      - name: Validate security policy
        run: scripts/validate-security-policy.sh check

      - name: Check tooling freshness
        run: scripts/check_latest_crates.sh

      - name: Check documentation links
        run: scripts/check_doc_links.sh

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Check dependency policy
        run: cargo deny check

      - name: Check RustSec advisories
        run: cargo audit

  windows-fail-closed:
    name: Windows fail-closed initialization
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        run: rustup show

      - name: Test portable CLI boundary
        run: cargo test -p sagnir-cli
